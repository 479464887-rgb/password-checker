<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Password Strength Checker - DevKit</title><meta name="description" content="在线密码强度检测 - 评估密码安全性"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}header{background:#161b22;border-bottom:1px solid #30363d;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}.logo{font-size:18px;font-weight:700;color:#58a6ff}.logo span{color:#f0c040}main{max-width:700px;margin:32px auto;padding:0 24px;flex:1}footer{padding:16px 24px;border-top:1px solid #21262d;text-align:center;font-size:12px;color:#484f58}footer a{color:#58a6ff;text-decoration:none;margin:0 8px}.ta{width:100%;padding:16px;font-size:13px;border:1px solid #30363d;border-radius:8px;background:#0d1117;color:#c9d1d9;resize:vertical;outline:none;font-family:mono;line-height:1.6}.ta:focus{border-color:#58a6ff}.btn{padding:10px 24px;font-size:13px;font-weight:600;border:1px solid #30363d;border-radius:8px;cursor:pointer;background:#21262d;color:#c9d1d9}.btn:hover{background:#30363d}.btn-p{background:#238636;border-color:#238636;color:#fff}.btn-p:hover{background:#2ea043}.actions{display:flex;gap:8px;margin:12px 0;flex-wrap:wrap;align-items:center}.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;margin:12px 0}</style></head><body><header><div class="logo">🛠 <span>Dev</span>Kit</div><div style="font-size:11px;color:#8b949e">🔒 本地处理 · 数据不上传</div></header><main><h1 style="font-size:24px;margin-bottom:4px">Password Strength Checker</h1><p style="color:#8b949e;font-size:14px;margin-bottom:16px">在线密码强度检测 - 评估密码安全性</p><div class="tool-wrapper"><div class="actions"><input type="text" id="pc-input" placeholder="输入密码..." style="flex:1;padding:12px;font-size:14px;border:1px solid #30363d;border-radius:8px;background:#0d1117;color:#c9d1d9;outline:none;font-family:mono"></div><div class="card" style="text-align:center"><div id="pc-strength-bar" style="height:8px;border-radius:4px;background:#21262d;margin-bottom:16px;transition:all 0.3s"><div id="pc-fill" style="height:100%;border-radius:4px;width:0;transition:all 0.3s"></div></div><div id="pc-score" style="font-size:24px;font-weight:700;color:#8b949e">输入密码</div><div id="pc-details" style="margin-top:12px;font-size:12px;color:#8b949e;line-height:1.8"></div></div></div></main><footer><a href="https://github.com/479464887-rgb/password-checker">GitHub</a><span>·</span><span>© 2026 DevKit</span></footer><script>document.getElementById('pc-input').addEventListener('input',function(){const p=this.value;let score=0;const checks=[{t:'长度≥8',p:p.length>=8},{t:'长度≥12',p:p.length>=12},{t:'长度≥16',p:p.length>=16},{t:'包含小写',p:/[a-z]/.test(p)},{t:'包含大写',p:/[A-Z]/.test(p)},{t:'包含数字',p:/[0-9]/.test(p)},{t:'包含符号',p:/[^a-zA-Z0-9]/.test(p)},{t:'非连续数字',p:!/1234|2345|3456|4567|5678|6789/.test(p)},{t:'非连续字母',p:!/abcd|bcde|cdef|defg|efgh/.test(p.toLowerCase())}];score=checks.filter(c=>c.p).length;const w=Math.min(100,(score/9)*100);const colors=['#f85149','#f85149','#d29922','#d29922','#f0c040','#3fb950','#3fb950','#58a6ff','#58a6ff'];document.getElementById('pc-fill').style.width=w+'%';document.getElementById('pc-fill').style.background=colors[score]||'#58a6ff';const labels=['极弱','很弱','弱','一般','中等','较强','强','很强','极强'];document.getElementById('pc-score').innerHTML='<span style=color:'+colors[score]+'>'+labels[score]+'</span>';document.getElementById('pc-details').innerHTML=checks.map(c=>(c.p?'✅':'❌')+' '+c.t).join('<br>')})
</script></body></html>
